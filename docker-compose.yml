version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: breakeat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: breakeat
      POSTGRES_PASSWORD: breakeat
      POSTGRES_DB: breakeat_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U breakeat -d breakeat_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: breakeat_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
