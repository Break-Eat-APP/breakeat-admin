name: Mobile Preview Build (Firebase App Distribution)

# Placeholder — sera complété quand apps/mobile/ios et apps/mobile/android
# auront été initialisés via `npx react-native init` ou équivalent.
# Pour l'instant ce workflow ne fait rien (skip).

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'iOS / Android / Both'
        required: true
        default: 'Both'
        type: choice
        options:
          - iOS
          - Android
          - Both
      release_notes:
        description: 'Release notes for testers'
        required: false
        default: 'Preview build from CI'

jobs:
  skip-until-native-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Skip — native projects not initialized yet
        run: |
          echo "⚠️  apps/mobile/ios and apps/mobile/android are not initialized yet."
          echo "Run 'npx react-native init' locally, then activate this workflow."
          exit 0

