[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "COREPACK_INTEGRITY_KEYS='' corepack enable && COREPACK_INTEGRITY_KEYS='' corepack prepare pnpm@11.3.0 --activate && pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["pnpm --filter @break-eat/backend build"]

[start]
cmd = "cd backend && pnpm db:migrate:prod && node dist/main"
